<!DOCTYPE HTML>
<html>

<head>
    <script src="https://cdn.logr-in.com/LogRocket.min.js" crossorigin="anonymous"></script>
    <script>window.LogRocket && window.LogRocket.init('7pmmx7/jh-stories');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- NOTE: alphabetical order must be maintained for icon names (for some reason) -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,700,0,0&icon_names=arrow_left_alt,arrow_right_alt,help,resume" />
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            font-size: 110%;
        }

        body {
            padding: 0;
            margin: 0;
            overscroll-behavior-y: none;
            overflow: hidden;
        }
    </style>
    <script src="/dist/elm.js"></script>
</head>

<body>
    <div id="elm-app-is-loaded-here"></div>
</body>
<script async src="https://cdn.jsdelivr.net/npm/es-module-shims@1/dist/es-module-shims.min.js"
    crossorigin="anonymous"></script>
<script type="importmap">
    {
      "imports": {
        "@popperjs/core": "https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/esm/popper.min.js",
        "bootstrap": "https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.esm.min.js",
        "panzoom": "https://unpkg.com/@panzoom/panzoom@4.6.1/dist/panzoom.min.js"
      }
    }
    </script>
<script type="module">
    import * as bootstrap from 'bootstrap';
    import * as panzoom from 'panzoom';

    const imageWidth = 2282;
    const imageHeight = 2095;

    let visited = Boolean(localStorage.getItem("visited") ?? false);
    localStorage.setItem("visited", true);

    let currentlyReadingStoryId = localStorage.getItem("currentlyReadingStoryId");

    let app = Elm.Main.init({
        node: document.getElementById('elm-app-is-loaded-here'),
        flags: {
            visited,
            imageBasePath: "/images/",
            currentlyReadingStoryId,
            imageWidth,
            imageHeight
        }
    });

    app.ports.saveToLocalStorage.subscribe((obj) => {
        for (const key in obj) {
            if (obj.hasOwnProperty(key)) {
                localStorage.setItem(key, obj[key]);
            }
        }
    });

    app.ports.setUpPanzoom.subscribe(() => {
        

        function GetStyleClass(className)
        {
            for (var i=0; i< document.styleSheets.length; i++) {
                var styleSheet = document.styleSheets[i]

                var rules = styleSheet.cssRules || styleSheet.rules

                for (var j=0; j<rules.length; j++) {
                    var rule = rules[j]

                    if (rule.selectorText === className) {
                        return(rule.style)
                    }
                }
            }

            return 0
        }
        // return; TODO
        setTimeout(() => {
            
            const jh = document.getElementById("jh");
            const minScale = 0.15;
            const panzoom = Panzoom(jh, { minScale, maxScale: 2.2, startScale: minScale, startX: -1165, startY: -7273, canvas: true, noBind: true});
            let downEvent = null;
            let panning = false;
            jh.addEventListener('pointerdown', event => {
                panning = true;
                downEvent = event;
                panzoom.handleDown(event);
            });
            document.addEventListener('pointermove', event => {
                if (panning) {
                    GetStyleClass('a').pointerEvents = "none"
                }
                panzoom.handleMove(event);
                // document.querySelector('a').addEventListener('click', function(e) {
                //     e.preventDefault();
                // });
                
            });
            document.addEventListener('pointerup', event => {
                GetStyleClass('a').pointerEvents = ""
                // console.log(panned);
                // console.log(event);
                // document.querySelector('a').addEventListener('click', function(e) {
                //     e.preventDefault();
                // });

                // // if (panned) {
                //     event.preventDefault();
                //     event.stopPropagation();
                //     event.stopImmediatePropagation();
                //     downEvent.preventDefault();
                //     downEvent.stopPropagation();
                //     downEvent.stopImmediatePropagation();
                //     event.cancelBubble = true;
                //     downEvent.cancelBubble = true;
                // // }
                downEvent = null;
                panning = false;
                panzoom.handleUp(event);
                return false;
            });
        }, 10);
    });
</script>

</html>
