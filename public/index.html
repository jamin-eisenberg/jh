<!DOCTYPE HTML>
<html>

<head>
    <script src="https://cdn.logr-in.com/LogRocket.min.js" crossorigin="anonymous"></script>
    <script>window.LogRocket && window.LogRocket.init('7pmmx7/jh-stories');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- NOTE: alphabetical order must be maintained for icon names (for some reason) -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,700,0,0&icon_names=arrow_left_alt,arrow_right_alt,first_page,help,resume" />
    <style>
        html,
        body {
            width: 100vw;
            height: -webkit-fill-available;
            height: 100dvh;
            padding: 0;
            margin: 0;
            overscroll-behavior-y: none;
            overflow: hidden;
        }
    </style>
    <script src="/dist/elm.js"></script>
</head>

<body>
    <div id="elm-app-is-loaded-here"></div>
</body>
<script async src="https://cdn.jsdelivr.net/npm/es-module-shims@1/dist/es-module-shims.min.js"
    crossorigin="anonymous"></script>
<script type="importmap">
    {
      "imports": {
        "@popperjs/core": "https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/esm/popper.min.js",
        "bootstrap": "https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.esm.min.js",
        "panzoom": "https://unpkg.com/@panzoom/panzoom@4.6.1/dist/panzoom.min.js"
      }
    }
    </script>
<script type="module">
    import * as bootstrap from 'bootstrap';
    import * as panzoom from 'panzoom';

    const imageWidth = 2282;
    const imageHeight = 2095;

    let visited = Boolean(localStorage.getItem("visited") ?? false);
    let visitedHomePage = Boolean(localStorage.getItem("visitedHomePage") ?? false);
    let fontSize = parseInt(localStorage.getItem("fontSize") ?? "19");
    document.documentElement.style.fontSize = fontSize + "px";
    
    const hasTouchScreen = navigator.maxTouchPoints > 0;

    if (!hasTouchScreen && !localStorage.getItem("visited")) {
        alert("You're welcome to access the JH on a computer, but just know that it'll probably look/act nicer on your phone.")
    }

    localStorage.setItem("visited", true);

    let currentlyReadingStoryId = localStorage.getItem("currentlyReadingStoryId");

    let app = Elm.Main.init({
        node: document.getElementById('elm-app-is-loaded-here'),
        flags: {
            visited,
            imageBasePath: "/images/",
            currentlyReadingStoryId,
            imageWidth,
            imageHeight,
            visitedHomePage,
            fontSize
        }
    });

    app.ports.setFontSize.subscribe((newFontSize) => {
        document.documentElement.style.fontSize = newFontSize + "px";
    });

    app.ports.saveToLocalStorage.subscribe((obj) => {
        for (const key in obj) {
            if (obj.hasOwnProperty(key)) {
                if (obj[key] !== null) {
                    localStorage.setItem(key, obj[key]);
                }
            }
        }
    });

    app.ports.setUpPanzoom.subscribe(() => {
        

        function GetStyleClass(className)
        {
            for (var i=0; i< document.styleSheets.length; i++) {
                var styleSheet = document.styleSheets[i]

                var rules = styleSheet.cssRules || styleSheet.rules

                for (var j=0; j<rules.length; j++) {
                    var rule = rules[j]

                    if (rule.selectorText === className) {
                        return(rule.style)
                    }
                }
            }

            return 0
        }

        const pan = JSON.parse(localStorage.getItem("pan") ?? "null") ?? {x: -1338, y: -497};
        const scale = localStorage.getItem("scale") ?? 1;
        setTimeout(() => {
            const jh = document.getElementById("jh");
            const minScale = 0.15;
            const panzoom = Panzoom(jh, { minScale, maxScale: 2.2, startScale: scale, startX: pan.x, startY: pan.y, canvas: true, noBind: true});
            let panning = false;
            jh.parentNode.addEventListener('pointerdown', event => {
                panning = true;
                panzoom.handleDown(event);
            });
            document.addEventListener('pointermove', event => {
                if (panning) {
                    GetStyleClass('a').pointerEvents = "none"
                }
                panzoom.handleMove(event);                
            });
            document.addEventListener('pointerup', event => {
                GetStyleClass('a').pointerEvents = ""
                panning = false;
                panzoom.handleUp(event);
                localStorage.setItem("pan", JSON.stringify(panzoom.getPan()));
                localStorage.setItem("scale", panzoom.getScale());
            });
        }, 10);
    });
</script>

</html>
