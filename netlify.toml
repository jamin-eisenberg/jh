[[plugins]]
  package = "netlify-plugin-cloudinary"

  [plugins.inputs]
  cloudName = "dtlwerjap"
  imagesPath = "/images"
  deliveryType = "upload"

[[redirects]]
  from = "/images/*"
  to = "https://res.cloudinary.com/dtlwerjap/image/upload/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200